var base64urlCharRegex = /[-_.]/g;

var base64urlToBase64Map = {
  '-': '+',
  _: '/',
  '.': '='
};

function u8ToBase64(u8, base64url) {
  var chars = [];
  for (var i = 0; i < u8.length; i++) {
    chars.push(String.fromCharCode(u8[i]));
  }
  var result = btoa(chars.join(''));

  if (base64url) {
    return result
      .replace(/\+/g, '-')
      .replace(/\//g, '_');
  }

  return result;
}

function base64ToU8(base64) {
  var base64Mod;

  if (/[-_.]/.test(base64)) {
    base64Mod = base64.replace(base64urlCharRegex, function (match) {
      return base64urlToBase64Map[match];
    });
  } else {
    base64Mod = base64;
  }

  base64Mod = atob(base64Mod);

  return new Uint8Array(
    base64Mod.split('').map(function (char) {
      return char.charCodeAt(0);
    })
  );
}

function stringToU8(str) {
  var utf8 = unescape(encodeURIComponent(str));
  var u8 = new Uint8Array(utf8.length);
  for (var i = 0; i < utf8.length; i++) {
    u8[i] = utf8.charCodeAt(i);
  }
  return u8;
}

        if (!vmFunctions.asyncSnapshotFunction) {
            return;
        }

        vmFunctions.asyncSnapshotFunction(
            function(response) {
                callback(response);
            },
            [
                args.contentBinding,
                args.signedTimestamp,
                args.webPoSignalOutput,
                args.skipPrivacyBuffer
            ]
        );

        snapshot(
            { webPoSignalOutput: webPoSignalOutput },
            function(_botguardResponse) {

        var getMinter = webPoSignalOutput[0];

        if (!getMinter) {
            console.log("minter does not exist!");
            return;
        }

        console.log("starting minter");

        mintCallback = getMinter(base64ToU8(integrityToken));
        console.log("minter is ready!");
        status("poReady");
    }

    function mintPOToken(identifier, contentBinding) {
        var result = mintCallback(stringToU8(contentBinding));

        if (!result) {
            console.log("result is undefined!")
            return;
        }

        if (!(result instanceof Uint8Array)) {
            console.log("result is invalid");
            return;
        }

        
        var poToken = u8ToBase64(result, true);
        document.location = "potoken-response://" + identifier + ";" + encodeURIComponent(poToken);
    }
